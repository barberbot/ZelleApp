<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movimientos Zelle</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Diseño premium y Mobile-First */
    :root {
      --primary: #7432ff; --success: #10a37f; --danger: #d93025;
      --bg: #f4f5f7; --card-bg: #ffffff; --text-main: #111111; --text-muted: #666666;
    }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, sans-serif; 
      background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); -webkit-font-smoothing: antialiased;
    }
    .header-container {
      background: rgba(244, 245, 247, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100; padding: 18px 20px;
      display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    .header-title { color: var(--primary); font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.3px; }
    
    /* Indicador de "En vivo" */
    .indicador-vivo { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--success); }
    .punto-rojo {
      width: 8px; height: 8px; background-color: #ff3b30; border-radius: 50%; animation: latido 1.5s infinite;
    }
    @keyframes latido {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }

    #contenedor-pagos { max-width: 600px; margin: 15px auto 40px auto; padding: 0 15px; }
    
    .tarjeta { 
      background: var(--card-bg); border-radius: 18px; padding: 20px; margin-bottom: 14px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; 
      opacity: 0; transform: translateY(20px); animation: aparecer 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes aparecer { to { opacity: 1; transform: translateY(0); } }
    
    .info-remitente { display: flex; flex-direction: column; gap: 4px; }
    .nombre { font-weight: 600; font-size: 16px; text-transform: capitalize; }
    .fecha { font-size: 13px; color: var(--text-muted); }
    .estado { 
      font-size: 11px; font-weight: 600; color: var(--success); background: rgba(16, 163, 127, 0.1); 
      padding: 5px 10px; border-radius: 20px; margin-top: 6px; display: inline-block; width: fit-content;
    }
    .estado.alerta { color: var(--danger); background: rgba(217, 48, 37, 0.1); }
    .monto { font-weight: 700; font-size: 22px; color: var(--success); letter-spacing: -0.5px; }
    
    /* Destello para inyección de nuevo pago */
    .tarjeta-nueva { animation: destello 2s ease-out forwards; }
    @keyframes destello {
      0% { background-color: #e6f7f1; transform: scale(1.02); }
      100% { background-color: var(--card-bg); transform: scale(1); }
    }

    .esqueleto { background: #fff; border-radius: 18px; padding: 20px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .shimmer { animation: shimmer 1.5s infinite linear; background: linear-gradient(to right, #f4f5f7 4%, #e9ebee 25%, #f4f5f7 36%); background-size: 1000px 100%; border-radius: 8px; }
    .sk-line-1 { width: 130px; height: 18px; margin-bottom: 8px; } .sk-line-2 { width: 90px; height: 12px; margin-bottom: 12px; } .sk-line-3 { width: 100px; height: 22px; border-radius: 20px; } .sk-monto { width: 80px; height: 26px; border-radius: 6px; }
    @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    .mensaje-vacio { text-align: center; color: var(--text-muted); padding: 40px 0; font-size: 15px; }
  </style>
</head>
<body>

  <div class="header-container">
    <h1 class="header-title">Zelle</h1>
    <div class="indicador-vivo">
      <div class="punto-rojo"></div>
      En vivo
    </div>
  </div>

  <div id="contenedor-pagos"></div>

  <script>
    // Configuración base de Supabase
    const supabaseUrl = 'https://jjjnnhbvshkjvgjxymyx.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqam5uaGJ2c2hranZnanh5bXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjI4NTIsImV4cCI6MjA5MDIzODg1Mn0.uNjmSZVELI-1Nw14hXsecOqAyYX4L-THFGmAQNAOyo8';

    const { createClient } = supabase;
    const cliente = createClient(supabaseUrl, supabaseKey);

    // Sistema de carga visual
    function mostrarEsqueleto() {
      const contenedor = document.getElementById('contenedor-pagos');
      let esqueletoHTML = '';
      for(let i=0; i<4; i++) {
        esqueletoHTML += `<div class="esqueleto"><div><div class="shimmer sk-line-1"></div><div class="shimmer sk-line-2"></div><div class="shimmer sk-line-3"></div></div><div class="shimmer sk-monto"></div></div>`;
      }
      contenedor.innerHTML = esqueletoHTML;
    }

    // Carga inicial al abrir la app
    async function cargarPagos() {
      const contenedor = document.getElementById('contenedor-pagos');
      if (contenedor.innerHTML.trim() === '') mostrarEsqueleto();

      try {
        const { data: datos, error } = await cliente
          .from('transacciones_zelle')
          .select('*')
          .order('id', { ascending: false });

        if (error) throw error;

        setTimeout(() => {
          contenedor.innerHTML = ''; 
          if (datos.length === 0) {
            contenedor.innerHTML = '<div class="mensaje-vacio">Bandeja al día. No hay pagos recientes.</div>';
          } else {
            datos.forEach((pago, index) => {
              const fechaObj = new Date(pago.fecha_registro);
              const fechaLocal = fechaObj.toLocaleString('es-VE', { 
                day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' 
              });

              const claseEstado = pago.estado.includes('Error') || pago.estado.includes('Alerta') ? 'estado alerta' : 'estado';
              const animDelay = index * 0.08;

              const tarjetaHTML = `
                <div class="tarjeta" style="animation-delay: ${animDelay}s">
                  <div class="info-remitente">
                    <span class="nombre">${pago.remitente}</span>
                    <span class="fecha">${fechaLocal}</span>
                    <span class="${claseEstado}">${pago.estado}</span>
                  </div>
                  <div class="monto">$${pago.monto}</div>
                </div>
              `;
              contenedor.innerHTML += tarjetaHTML;
            });
          }
        }, 300); 

      } catch (error) {
        console.error('Error:', error);
        contenedor.innerHTML = '<div class="mensaje-vacio" style="color: var(--danger);">Error de conexión. Verifica tu internet.</div>';
      }
    }

  // --- MAGIA: SUSCRIPCIÓN EN TIEMPO REAL CON INYECCIÓN DIRECTA ---
    cliente
      .channel('cambios-zelle')
      .on(
        'postgres_changes', 
        { event: 'INSERT', schema: 'public', table: 'transacciones_zelle' }, 
        (payload) => {
          console.log('1. ¡Señal recibida de Supabase!', payload);
          
          try {
            const nuevoPago = payload.new;
            console.log('2. Datos crudos extraídos:', nuevoPago);

            const fechaObj = new Date(nuevoPago.fecha_registro);
            const fechaLocal = fechaObj.toLocaleString('es-VE', { 
              day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' 
            });
            console.log('3. Fecha formateada con éxito:', fechaLocal);

            // Blindaje: Si por algún error la base de datos manda el estado vacío, no colapsa
            const estadoTexto = nuevoPago.estado || 'Procesado';
            const claseEstado = estadoTexto.includes('Error') || estadoTexto.includes('Alerta') ? 'estado alerta' : 'estado';
            console.log('4. Estado calculado:', claseEstado);
            
            // Blindaje: Si falta el remitente o el monto, ponemos un respaldo
            const tarjetaHTML = `
              <div class="tarjeta tarjeta-nueva" style="animation-delay: 0s">
                <div class="info-remitente">
                  <span class="nombre">${nuevoPago.remitente || 'Desconocido'}</span>
                  <span class="fecha">${fechaLocal}</span>
                  <span class="${claseEstado}">${estadoTexto}</span>
                </div>
                <div class="monto">$${nuevoPago.monto || '0.00'}</div>
              </div>
            `;
            console.log('5. Diseño HTML construido perfectamente.');
            
            const contenedor = document.getElementById('contenedor-pagos');
            
            if (contenedor.innerHTML.includes('Bandeja al día') || contenedor.innerHTML.includes('Error')) {
              contenedor.innerHTML = '';
            }
            
            contenedor.insertAdjacentHTML('afterbegin', tarjetaHTML);
            console.log('6. ¡Éxito! Tarjeta insertada en la pantalla.');

          } catch (errorVisual) {
            console.error('🚨 ERROR CRÍTICO AL DIBUJAR LA TARJETA:', errorVisual);
          }
        }
      )
      .subscribe();

    // Arrancamos el motor
    cargarPagos();

  </script>
</body>
</html>
