<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Movimientos Zelle</title>
  <style>
    /* Diseño Mobile-First */
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background-color: #f4f5f7; 
      margin: 0; 
      padding: 15px; 
    }
    .header { 
      text-align: center; 
      color: #7432ff; 
      margin-bottom: 25px; 
      font-size: 24px;
      font-weight: bold;
    }
    #contenedor-pagos {
      max-width: 600px; /* Para que no se estire demasiado en PC */
      margin: 0 auto;
    }
    .tarjeta { 
      background: white; 
      border-radius: 12px; 
      padding: 16px; 
      margin-bottom: 12px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .info-remitente { 
      display: flex; 
      flex-direction: column; 
    }
    .nombre { 
      font-weight: bold; 
      font-size: 16px; 
      color: #111; 
      text-transform: capitalize;
    }
    .fecha { 
      font-size: 13px; 
      color: #777; 
      margin-top: 4px; 
    }
    .estado { 
      font-size: 11px; 
      color: #10a37f; 
      background: #e6f7f1; 
      padding: 4px 8px; 
      border-radius: 12px; 
      margin-top: 8px; 
      display: inline-block;
      width: fit-content;
    }
    .estado.alerta {
      color: #d93025;
      background: #fce8e6;
    }
    .monto { 
      font-weight: bold; 
      font-size: 22px; 
      color: #10a37f; 
    }
    .cargando {
      text-align: center;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="header">Pagos Recibidos</div>
  <div id="contenedor-pagos">
    <div class="cargando">Conectando con la base de datos...</div>
  </div>

  <script>
    // --- CONFIGURACIÓN DE TU BASE DE DATOS ---
   // --- CONFIGURACIÓN DE TU BASE DE DATOS ---
    // 1. URL con la ruta exacta de la tabla y entre comillas simples:
    const supabaseUrl = 'https://jjjnnhbvshkjvgjxymyx.supabase.co/rest/v1/transacciones_zelle?select=*&order=id.desc';
    
    // 2. Tu API Key anónima (también entre comillas simples):
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqam5uaGJ2c2hranZnanh5bXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjI4NTIsImV4cCI6MjA5MDIzODg1Mn0.uNjmSZVELI-1Nw14hXsecOqAyYX4L-THFGmAQNAOyo8';
    // Función principal que consulta a Supabase y pinta el HTML
    async function cargarPagos() {
      try {
        const respuesta = await fetch(supabaseUrl, {
          method: 'GET',
          headers: {
            'apikey': supabaseKey,
            'Authorization': 'Bearer ' + supabaseKey
          }
        });
        
        const datos = await respuesta.json();
        const contenedor = document.getElementById('contenedor-pagos');
        contenedor.innerHTML = ''; // Limpiamos el mensaje de "Cargando..."

        if (datos.length === 0) {
          contenedor.innerHTML = '<div class="cargando">Aún no hay pagos registrados.</div>';
          return;
        }

        // Recorremos los datos y creamos una tarjeta por cada pago
        datos.forEach(pago => {
          // Formatear la fecha para que se lea fácil
          const fechaObj = new Date(pago.fecha_registro);
          const fechaLocal = fechaObj.toLocaleString('es-ES', { 
            day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' 
          });

          // Definir el color del estado por si hubo error en la extracción
          const claseEstado = pago.estado.includes('Error') || pago.estado.includes('Alerta') ? 'estado alerta' : 'estado';

          // Construir la tarjeta HTML
          const tarjetaHTML = `
            <div class="tarjeta">
              <div class="info-remitente">
                <span class="nombre">${pago.remitente}</span>
                <span class="fecha">${fechaLocal}</span>
                <span class="${claseEstado}">${pago.estado}</span>
              </div>
              <div class="monto">$${pago.monto}</div>
            </div>
          `;
          
          // Inyectar la tarjeta en la página
          contenedor.innerHTML += tarjetaHTML;
        });

      } catch (error) {
        console.error('Error al cargar datos:', error);
        document.getElementById('contenedor-pagos').innerHTML = '<div class="cargando" style="color: red;">Error de conexión. Intenta recargar la página.</div>';
      }
    }

    // Ejecutar la función apenas se abre la página
    cargarPagos();
  </script>

</body>
</html>
